<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamil United Cricket Club</title>
    <meta name="description" content="Tamil United Cricket Club — Player Availability App" />
    <meta property="og:title" content="Tamil United Cricket Club" />
    <meta property="og:description" content="Player availability, team selection and stats for Tamil United CC — Plymouth, Devon" />
    <meta name="theme-color" content="#1e3a8a" />

    <!-- Outfit — clean, modern variable font with personality -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #060d1f;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* Tabular nums for all numeric data */
      .num { font-variant-numeric: tabular-nums; }
      /* Smooth scroll */
      html { scroll-behavior: smooth; }
      /* Skip to content for accessibility */
      .skip-link { position: absolute; top: -40px; left: 0; background: #1e3a8a; color: #fff; padding: 8px 16px; z-index: 9999; border-radius: 0 0 8px 0; }
      .skip-link:focus { top: 0; }
      a { color: inherit; }
      input, select, textarea, button { font-family: inherit; }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #2563eb !important;
        box-shadow: 0 0 0 3.5px rgba(37, 99, 235, 0.14), 0 1px 3px rgba(30, 58, 138, 0.08);
      }
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 99px; }

      /* ── Scroll-driven animations (Direction C) ──────── */
      @supports (animation-timeline: scroll()) {
        .hero-parallax {
          animation: heroParallax linear both;
          animation-timeline: scroll(root);
          animation-range: 0px 300px;
          will-change: transform;
        }
        @keyframes heroParallax {
          from { transform: translateY(0px); }
          to   { transform: translateY(-40px); }
        }

        .hero-badge-float {
          animation: badgeFloat linear both;
          animation-timeline: scroll(root);
          animation-range: 0px 200px;
          will-change: transform, opacity;
        }
        @keyframes badgeFloat {
          from { transform: translateY(0) scale(1); opacity: 1; }
          to   { transform: translateY(-24px) scale(0.88); opacity: 0.6; }
        }

        .scroll-reveal {
          animation: scrollReveal linear both;
          animation-timeline: view();
          animation-range: entry 0% entry 25%;
        }
        @keyframes scrollReveal {
          from { opacity: 0; transform: translateY(16px); }
          to   { opacity: 1; transform: translateY(0); }
        }
      }

      /* ── Live counter flip (Direction B) ─────────────── */
      @property --count-prev {
        syntax: '<integer>';
        initial-value: 0;
        inherits: false;
      }
      .count-flip {
        font-variant-numeric: tabular-nums;
        transition: transform 300ms cubic-bezier(0.23,1,0.32,1), opacity 200ms ease;
      }
      .count-flip.changed {
        animation: countFlip 320ms cubic-bezier(0.23,1,0.32,1) forwards;
      }
      @keyframes countFlip {
        0%   { transform: translateY(-8px); opacity: 0.3; }
        100% { transform: translateY(0);    opacity: 1;   }
      }

      /* ── Pending chip pulse ───────────────────────────── */
      @keyframes pendingPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.55; }
      }
      .chip-pending-dot {
        animation: pendingPulse 2.2s ease-in-out infinite;
      }

      /* ── Mobile responsiveness ───────────────────────── */

      /* Prevent horizontal scroll on all screens */
      html, body { overflow-x: hidden; width: 100%; }

      /* Fluid images */
      img { max-width: 100%; height: auto; }

      /* On very small screens (< 360px), tighten padding */
      @media (max-width: 360px) {
        body { font-size: 14px; }
      }

      /* Nav: shrink text on small phones */
      @media (max-width: 400px) {
        .tucc-nav-brand-text { display: none; }
      }

      /* Touch-friendly tap targets — at least 44px */
      button, a, [role="button"] {
        min-height: 36px;
        -webkit-tap-highlight-color: transparent;
      }

      /* Smooth momentum scrolling on iOS */
      * { -webkit-overflow-scrolling: touch; }

      /* Accessibility: reduce motion for users who prefer it */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      /* Auto-recover from a stale cached page referencing JS chunks that no
         longer exist after a deploy (common cause of a blank page). Reloads with
         a cache-busting query so the browser/CDN fetch FRESH HTML + chunks, and
         a time-based guard (not once-ever) so a stuck client always recovers. */
      (function () {
        var CHUNK_RE = /dynamically imported module|module script failed|failed to fetch|importing a module|error loading|chunkloaderror|unexpected token '<'/i;
        function hardReload() {
          try {
            var last = +sessionStorage.getItem('tucc_chunk_reload_at') || 0;
            if (Date.now() - last < 20000) return; // avoid reload loops
            sessionStorage.setItem('tucc_chunk_reload_at', String(Date.now()));
          } catch (e) {}
          var u = location.pathname + (location.search || '');
          u += (u.indexOf('?') > -1 ? '&' : '?') + '_r=' + Date.now();
          location.replace(u); // unique URL → bypass stale HTML cache
        }
        window.addEventListener('vite:preloadError', function (e) { if (e && e.preventDefault) e.preventDefault(); hardReload(); });
        window.addEventListener('error', function (e) {
          if (CHUNK_RE.test((e && e.message) || '')) hardReload();
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason; var m = (r && (r.message || r)) || '';
          if (CHUNK_RE.test(String(m))) hardReload();
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
